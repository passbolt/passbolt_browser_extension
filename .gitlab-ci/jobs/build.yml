build_firefox:
  stage: build
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/node:22
  extends: .rules
  artifacts:
    when: always
    paths:
      - dist/firefox
  script:
    - |
      apt-get update
      apt-get install -y curl zip
      npm ci
      mkdir -p dist/firefox
      npx grunt build-firefox
      if [[ "$CI_COMMIT_TAG" != "" ]]; then
        echo "Sending slack build notification"
        echo "================================"
        bash ./.gitlab-ci/scripts/bin/slack-status-messages.sh ":jigsaw: A new wild Firefox browser extension appeared! $CI_COMMIT_TAG" "$CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/browse/dist/"
      fi

